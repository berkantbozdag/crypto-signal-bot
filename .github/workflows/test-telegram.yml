name: Test Telegram

on:
  workflow_dispatch:

jobs:
  test-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python - <<'PY'
          import os, json, urllib.request, urllib.parse

          token = os.environ["TELEGRAM_BOT_TOKEN"]

          updates_url = f"https://api.telegram.org/bot{token}/getUpdates"
          with urllib.request.urlopen(updates_url, timeout=20) as r:
              data = json.loads(r.read().decode())

          results = data.get("result", [])
          if not results:
              raise Exception("Chat id bulunamadı. Telegram’da önce Nuri23Bot’a /start yaz.")

          chat_id = None
          for upd in reversed(results):
              msg = upd.get("message") or upd.get("edited_message")
              if msg and "chat" in msg:
                  chat_id = msg["chat"]["id"]
                  break

          if not chat_id:
              raise Exception("Chat id bulunamadı. Bota /start yaz.")

          text = "✅ Kanka Telegram bot çalışıyor. GitHub bağlantısı tamam."

          send_url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": text
          }).encode()

          req = urllib.request.Request(send_url, data=payload, method="POST")
          with urllib.request.urlopen(req, timeout=20) as r:
              print(r.read().decode())
          PY
