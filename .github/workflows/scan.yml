name: Binance Hourly Telegram Volume Scan

on:
  workflow_dispatch:

  schedule:
    - cron: "5 * * * *"

permissions:
  contents: write

concurrency:
  group: binance-hourly-telegram-volume-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Taramayı çalıştır ve Telegram'a gönder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py

      - name: Sonuçları repo içine kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add results state

          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Hourly Binance Telegram volume scan update"
            git push
          fi
