name: Binance Hourly ATH Body Volume Scan

on:
  workflow_dispatch:

  schedule:
    - cron: "5 * * * *"

permissions:
  contents: write

concurrency:
  group: binance-hourly-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Taramayı çalıştır
        run: |
          python scanner.py

      - name: Sonuçları commit et
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add results/scan_latest.csv results/scan_latest.md
          git add results/volume_spikes_latest.csv results/volume_spikes_latest.md
          git add state/last_hour_snapshot.csv

          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Hourly Binance volume scan update"
            git push
          fi
